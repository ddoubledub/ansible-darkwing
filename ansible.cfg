[defaults]
inventory = inventories/prod/hosts.yml
retry_files_enabled = False
stdout_callback = ansible.builtin.default
result_format = yaml
bin_ansible_callbacks = True
forks = 20
timeout = 10
interpreter_python = auto_silent

# TODO: Set to your SSH private key path
# private_key_file = /path/to/your/ssh/key

# Merge shared and personal roles
roles_path = ./roles
remote_tmp = /tmp/.ansible-${USER}
log_path = ./logs/ansible.log

# Vault and SSH handling
host_key_checking = False
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ControlPath=~/.ssh/ansible-conn-%r@%h:%p

# TODO: Set to your vault password file path if using ansible-vault
# vault_password_file = /path/to/.vault_pass

retry_files_save_path = ./retries

# TODO: Set to your Ansible service account username
remote_user = ansible
ansible_python_interpreter = auto_silent

[ssh_connection]
pipelining = True
# SSH multiplexing — speeds up runs against many hosts significantly.
# Adjust ControlPath and known_hosts to match your environment.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ControlPath=/tmp/ansible-%r@%h:%p
host_key_checking = False
