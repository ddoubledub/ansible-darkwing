                {syncLog.length>0&&<div style={{marginBottom:"16px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}><div style={S.label}>Output</div><button onClick={()=>setSyncLog([])} style={{background:"transparent",border:"none",color:"#3e3e5c",cursor:"pointer",fontSize:"10px"}}>clear</button></div><div style={{background:"#0a0a16",border:"1px solid #1c1c2e",borderRadius:"6px",padding:"10px",maxHeight:"160px",overflowY:"auto",fontSize:"11px",lineHeight:"1.6"}}>{syncLog.map((l,i)=><div key={i} style={{color:l.type==="cmd"?"#a78bfa":l.type==="success"?"#00ff88":l.type==="error"?"#ff3366":"#5e5e85"}}><span style={{color:"#2d2d42",marginRight:"8px"}}>{l.time}</span>{l.msg}</div>)}</div></div>}
                <div style={S.label}>Recent Commits</div>{gitLog.map(c=><div key={c.hash} style={{display:"flex",gap:"10px",padding:"5px 0",borderBottom:"1px solid #111",alignItems:"center"}}><span style={{color:"#ff2d7f",fontSize:"11px",flex:"0 0 58px"}}>{c.hash}</span><span style={{color:"#c0c0d8",fontSize:"12px",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.message}</span><span style={{color:"#3e3e5c",fontSize:"11px",flex:"0 0 90px",textAlign:"right"}}>{c.time}</span></div>)}
              </div>)}

              {/* ── TERMINAL ── */}
              {tab==="term"&&(<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 120px)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}><div style={S.label}>Terminal <span style={{color:"#3e3e5c",fontWeight:400,textTransform:"none",letterSpacing:"normal"}}>cwd: /repo</span></div><div style={{display:"flex",gap:"8px"}}>{termRunning&&<button onClick={()=>{if(wsRef.current?.readyState===1)wsRef.current.send(JSON.stringify({cmd:"SIGINT"}));}} style={{background:"#ff3366",color:"#fff",border:"none",padding:"4px 12px",borderRadius:"4px",cursor:"pointer",fontSize:"11px",fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>Ctrl+C</button>}<button onClick={()=>setTermLines([])} style={{...S.btn(false),padding:"4px 12px",fontSize:"11px"}}>Clear</button></div></div>
                <div ref={termRef} style={{flex:1,background:"#0a0a16",border:"1px solid #1c1c2e",borderRadius:"6px 6px 0 0",padding:"12px",overflow:"auto",fontSize:"12px",lineHeight:"1.6",minHeight:"200px"}}>
                  {termLines.map((l,i)=><div key={i} style={{color:l.type==="cmd"?"#a78bfa":l.type==="stdout"?"#e0e0f0":l.type==="stderr"?"#ff5577":l.type==="exit"?(l.code===0?"#00ff88":"#ff3366"):"#5e5e85",fontWeight:l.type==="cmd"?700:400,whiteSpace:"pre-wrap",wordBreak:"break-all"}}>{l.type==="exit"?`\n  exit: ${l.code}`:l.data}</div>)}
                  {termRunning&&<span style={{color:"#00f0ff",animation:"blink 1s infinite"}}>_</span>}
                </div>
                <div style={{display:"flex",background:"#151522",border:"1px solid #1c1c2e",borderTop:"none",borderRadius:"0 0 6px 6px"}}><span style={{padding:"10px 8px 10px 14px",color:"#00f0ff",fontSize:"14px",fontWeight:700,textShadow:"0 0 8px #00f0ff66"}}>$</span><input value={termCmd} onChange={e=>setTermCmd(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!termRunning)sendTermCmd();if(e.key==="c"&&e.ctrlKey&&termRunning&&wsRef.current?.readyState===1)wsRef.current.send(JSON.stringify({cmd:"SIGINT"}));if(e.key==="ArrowUp"){e.preventDefault();const n=Math.min(historyIdx+1,termHistory.length-1);setHistoryIdx(n);if(termHistory[n])setTermCmd(termHistory[n]);}if(e.key==="ArrowDown"){e.preventDefault();const n=Math.max(historyIdx-1,-1);setHistoryIdx(n);setTermCmd(n>=0?termHistory[n]:"");}}} placeholder={termRunning?"Running... (Ctrl+C)":"ansible-playbook, git, ssh ..."} disabled={termRunning} style={{flex:1,background:"transparent",color:"#e0e0f0",border:"none",padding:"10px 14px 10px 4px",fontSize:"13px",fontFamily:"'JetBrains Mono',monospace"}}/></div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginTop:"10px"}}>
                  {["ansible --version",`ansible-inventory -i inventories/${env} --graph`,"git status","git log --oneline -10"].map(cmd=><button key={cmd} onClick={()=>setTermCmd(cmd)} style={{background:"#151522",border:"1px solid #1c1c2e",color:"#5e5e85",padding:"4px 10px",borderRadius:"4px",cursor:"pointer",fontSize:"10px",fontFamily:"'JetBrains Mono',monospace"}}>{cmd}</button>)}
                </div>
              </div>)}

            </div>
          </div>

          {/* ── DRAG HANDLE ── */}
          <div onMouseDown={handleMouseDown} style={{width:"6px",cursor:"col-resize",background:dragging?"#00f0ff44":"#1c1c2e",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.background="#00f0ff33"} onMouseLeave={e=>{if(!dragging)e.currentTarget.style.background="#1c1c2e";}}>
            <div style={{width:"2px",height:"40px",background:"#3e3e5c",borderRadius:"1px"}}/>
          </div>

          {/* ═══ RIGHT PREVIEW PANEL ═══ */}
          <div style={{width:`${sidebarWidth}px`,flexShrink:0,background:"#10101a",display:"flex",flexDirection:"column"}}>
            <div style={{display:"flex",borderBottom:"1px solid #1c1c2e",flexWrap:"wrap"}}>
              {[{id:"playbook",label:"playbook.yml",color:"#b4ff39"},{id:"cfg",label:"ansible.cfg",color:"#a78bfa"},
                ...(selectedPlaybook?[{id:"existing",label:selectedPlaybook.path,color:"#ff2d7f"}]:[]),
                ...(roleDetail?[{id:"role",label:`${roleDetail.name}`,color:"#ffb300"}]:[]),
              ].map(pt=><button key={pt.id} onClick={()=>setPreviewTab(pt.id)} style={{padding:"10px 12px",background:"transparent",border:"none",borderBottom:previewTab===pt.id?`2px solid ${pt.color}`:"2px solid transparent",color:previewTab===pt.id?pt.color:"#3e3e5c",fontFamily:"'JetBrains Mono',monospace",fontSize:"12px",cursor:"pointer",textShadow:previewTab===pt.id?`0 0 8px ${pt.color}44`:"none"}}>{pt.label}</button>)}
              <div style={{flex:1}}/>
              <button onClick={()=>{const t=previewTab==="playbook"?yaml:previewTab==="cfg"?ansibleCfg:previewTab==="existing"?(selectedPlaybook?.raw||""):previewTab==="role"?(roleDetail?.files?.[`${roleDetailTab}/main.yml`]||""):"";copyText(t,previewTab);}} style={{background:copiedTarget===previewTab?"#00f0ff":"transparent",border:"1px solid #222",color:copiedTarget===previewTab?"#0c0c14":"#50507a",padding:"4px 12px",borderRadius:"4px",cursor:"pointer",fontSize:"11px",fontFamily:"'JetBrains Mono',monospace",margin:"6px 8px"}}>{copiedTarget===previewTab?"Copied!":"Copy"}</button>
              {previewTab==="playbook"&&<button onClick={savePlaybook} style={{background:"#00f0ff",color:"#0c0c14",border:"none",padding:"4px 12px",borderRadius:"4px",cursor:"pointer",fontSize:"11px",fontWeight:700,fontFamily:"'JetBrains Mono',monospace",margin:"6px 4px 6px 0"}}>Save</button>}
            </div>
            {previewTab==="role"&&roleDetail&&<div style={{display:"flex",borderBottom:"1px solid #1c1c2e",background:"#0c0c14"}}>
              {["tasks","defaults","vars","handlers","meta"].map(sub=>{const has=roleDetail.files?.[`${sub}/main.yml`];return<button key={sub} onClick={()=>{setRoleDetailTab(sub);setRoleEditing(false);}} style={{padding:"6px 12px",background:"transparent",border:"none",borderBottom:roleDetailTab===sub?"2px solid #ffb300":"2px solid transparent",color:roleDetailTab===sub?"#ffb300":has?"#5e5e85":"#2d2d42",fontFamily:"'JetBrains Mono',monospace",fontSize:"11px",cursor:"pointer"}}>{sub}{!has&&" ∅"}</button>;})}
              <div style={{flex:1}}/>
              <button onClick={async()=>{
                if(roleEditing){
                  try{await API.put(`/role/${roleDetail.name}/${roleDetailTab}/main.yml`,{content:roleEditContent});
                  const d=await API.get(`/role/${roleDetail.name}`);setRoleDetail(d);loadAll();setRoleEditing(false);}catch(e){alert(e);}
                }else{setRoleEditContent(roleDetail.files?.[`${roleDetailTab}/main.yml`]||`---\n# ${roleDetailTab}/main.yml for ${roleDetail.name}\n`);setRoleEditing(true);}
              }} style={{background:roleEditing?"#ffb300":"transparent",border:roleEditing?"none":"1px solid #333",color:roleEditing?"#0c0c14":"#7878a0",padding:"4px 12px",borderRadius:"4px",cursor:"pointer",fontSize:"10px",fontWeight:roleEditing?700:400,fontFamily:"'JetBrains Mono',monospace",margin:"4px 8px"}}>{roleEditing?"Save":"Edit"}</button>
              {roleEditing&&<button onClick={()=>setRoleEditing(false)} style={{background:"transparent",border:"1px solid #333",color:"#7878a0",padding:"4px 10px",borderRadius:"4px",cursor:"pointer",fontSize:"10px",fontFamily:"'JetBrains Mono',monospace",margin:"4px 4px 4px 0"}}>Cancel</button>}
            </div>}
            {/* Content area — textarea when editing role, pre otherwise */}
            {previewTab==="role"&&roleEditing?(
              <textarea value={roleEditContent} onChange={e=>setRoleEditContent(e.target.value)} style={{flex:1,padding:"20px",margin:0,background:"#10101a",color:"#ffb300",border:"none",fontSize:"12px",lineHeight:"1.7",fontFamily:"'JetBrains Mono',monospace",resize:"none",outline:"none",boxSizing:"border-box"}}/>
            ):(
              <pre style={{flex:1,padding:"20px",margin:0,overflow:"auto",fontSize:"12px",lineHeight:"1.7",color:previewTab==="playbook"?"#b4ff39":previewTab==="cfg"?"#a78bfa":previewTab==="role"?"#ffb300":"#ff2d7f",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
                {previewTab==="playbook"&&yaml}
                {previewTab==="cfg"&&(ansibleCfg||"# No ansible.cfg")}
                {previewTab==="existing"&&(selectedPlaybook?.raw||"")}
                {previewTab==="role"&&(roleDetail?.files?.[`${roleDetailTab}/main.yml`]||`# No ${roleDetailTab}/main.yml`)}
              </pre>
            )}
            <div style={{borderTop:"1px solid #1c1c2e",padding:"10px 16px",display:"flex",gap:"14px",fontSize:"11px",color:"#50507a",flexWrap:"wrap"}}>
              <span>env: <span style={{color:"#a78bfa"}}>{env}</span></span>
              <span>targets: <span style={{color:play.targets.length?"#00f0ff":"#50507a"}}>{play.targets.length}</span></span>
              <span>roles: <span style={{color:play.roles.length?"#00f0ff":"#50507a"}}>{play.roles.length}</span></span>
              <span>git: <span style={{color:dirtyCount?"#ffb300":"#00ff88"}}>{dirtyCount?`${dirtyCount} dirty`:"clean"}</span></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
